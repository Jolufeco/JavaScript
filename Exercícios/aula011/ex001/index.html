<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>veja se foi multado
    </h1>

    <p>
        coloque sua velocidade
    </p>
    <input type="number" id="num">
    <input type="button" value="Clique" onclick="Calcular()">
    <p id="resultado">Resultando</p>

<script>
    function Calcular(){
        var n1 = document.getElementById('num');
        var resf = document.getElementById('resultado');
        var textn1 = Number(n1.value);
        resf.innerText = `Sua velocidade era de ${textn1}km/h.`
        
        if (textn1 > 50) {
            resf.innerHTML += `<p>Você foi <strong> multado! </strong></p>`
        }
        
    }



</script>

</body>
</html>
